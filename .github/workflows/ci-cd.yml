name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  security-events: write
  id-token: write
  issues: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/akingbadeomosebi/observeops-backend
  IMAGE_FRONTEND: ghcr.io/akingbadeomosebi/observeops-frontend

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # ============ SECRET SCANNING ============
      
      - name: GitLeaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============ CODE QUALITY & SECURITY ============
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=AkingbadeOmosebi_ObserveOps
            -Dsonar.organization=akingbadeomosebi
            -Dsonar.sources=app/backend,app/frontend/src
            -Dsonar.exclusions=**/node_modules/**,**/*.test.js
            -Dsonar.scanner.skip=false
      
      # ============ DEPENDENCY SCANNING ============
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'ObserveOps'
          path: '.'
          format: 'HTML'
          args: >
            --enableRetired
            --scan app/backend
            --scan app/frontend
            --exclude node_modules
            --failOnCVSS 7.0
      
      - name: Upload OWASP HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports/
      
      # ============ SNYK SCANNING ============
      
      - name: Setup Node.js for Snyk
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Snyk Backend Dependencies
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=app/backend/package.json
      
      - name: Snyk Frontend Dependencies
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=app/frontend/package.json

  build-scan-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name != 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # ============ BACKEND ============
      
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          load: true
          tags: observeops-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        continue-on-error: true 
        with:
          image-ref: observeops-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
      
      - name: Upload Backend Scan Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Backend Metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/observeops-backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Push Backend to GHCR
        id: push-backend
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      
      - name: Sign Backend Image
        env:
          DIGEST: ${{ steps.push-backend.outputs.digest }}
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/observeops-backend@${DIGEST}
      
      # ============ FRONTEND ============
      
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          load: true
          tags: observeops-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@master
        continue-on-error: true 
        with:
          image-ref: observeops-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
      
      - name: Upload Frontend Scan Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
      
      - name: Frontend Metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/observeops-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Push Frontend to GHCR
        id: push-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha

      - name: Sign Frontend Image
        run: |
          cosign sign --yes ${{ env.IMAGE_FRONTEND }}@${{ steps.push-frontend.outputs.digest }}
      
      - name: Sign Frontend Image
        env:
          DIGEST: ${{ steps.push-frontend.outputs.digest }}
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/observeops-frontend@${DIGEST}

  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: build-scan-push
    if: github.event_name != 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install Dependencies
        run: npm install
      
      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release