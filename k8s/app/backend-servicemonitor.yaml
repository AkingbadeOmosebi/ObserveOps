apiVersion: v1
kind: Service
metadata:
  name: backend-metrics
  namespace: app
  labels:
    app: backend
    release: prometheus
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: metrics
      port: 3001
      targetPort: 3001

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: app
  labels:
    app: backend
    release: prometheus  # This label is required
spec:
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s