global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'akingbadeomosebi@gmail.com'
  smtp_auth_username: 'akingbadeomosebi@gmail.com'
  smtp_auth_password_file: '/etc/alertmanager/secrets/alertmanager-email-secret/password'
  smtp_require_tls: true

inhibit_rules:
- equal:
  - namespace
  - alertname
  source_matchers:
  - severity = critical
  target_matchers:
  - severity =~ warning|info

receivers:
- name: 'null'
- name: 'email-alerts'
  email_configs:
  - to: 'akingbadeomosebi@gmail.com'
    send_resolved: true
    headers:
      Subject: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'

route:
  group_by:
  - namespace
  - alertname
  group_interval: 5m
  group_wait: 30s
  receiver: 'email-alerts'
  repeat_interval: 12h
  routes:
  - matchers:
    - alertname = "Watchdog"
    receiver: "null"
  - matchers:
    - severity = critical
    receiver: 'email-alerts'
    repeat_interval: 5m

templates:
- /etc/alertmanager/config/*.tmpl